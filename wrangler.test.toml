# AGI Test Worker - local/dev only (pnpm run worker:dev:test)
name = "agi-test"
main = "src/test-worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "test"

[env.test]
name = "agi-test"
routes = []
[env.test.vars]
ENVIRONMENT = "test"

[observability]
enabled = true
head_sampling_rate = 1 