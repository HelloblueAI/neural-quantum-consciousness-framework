# AGI Enhanced API Worker - api.agi.bleujs.org
name = "enhanced-agi"
main = "src/enhanced-agi-worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[env.production]
name = "enhanced-agi"
routes = ["api.agi.bleujs.org/*"]
[env.production.vars]
ENVIRONMENT = "production"

[env.staging]
name = "enhanced-agi-staging"
routes = []
[env.staging.vars]
ENVIRONMENT = "staging"

[env.development]
name = "enhanced-agi-dev"
routes = []
[env.development.vars]
ENVIRONMENT = "development"

[observability]
enabled = true
head_sampling_rate = 1
