# AGI Advanced Worker - advanced-agi.bleujs.org
name = "advanced-agi"
main = "src/advanced-agi-worker.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[env.production]
name = "advanced-agi"
routes = ["advanced-agi.bleujs.org/*"]
[env.production.vars]
ENVIRONMENT = "production"

[env.staging]
name = "advanced-agi-staging"
routes = []
[env.staging.vars]
ENVIRONMENT = "staging"

[env.development]
name = "advanced-agi-dev"
routes = []
[env.development.vars]
ENVIRONMENT = "development"

[observability]
enabled = true
head_sampling_rate = 1 